<!DOCTYP<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="costilla.css">

<title>Encuesta Visual</title>
</head>

<body class="bg-light">

<div class="container py-5">

<div class="card shadow p-4">

<h3 class="text-center mb-4">Encuesta</h3>

<form id="formEncuesta">

<div class="mb-3">
<label class="form-label">Nombre (opcional)</label>
<input type="text" id="nombre" class="form-control">
</div>

<h5 class="mb-3">¿Cuál opción eliges?</h5>

<div class="row">

<div class="col-md-4 text-center">
<img src="https://picsum.photos/300?1" class="img-fluid rounded">
<h6 class="mt-2">Opción 1</h6>
<input type="radio" name="opcion" value="Opcion1" required>
</div>

<div class="col-md-4 text-center">
<img src="https://picsum.photos/300?2" class="img-fluid rounded">
<h6 class="mt-2">Opción 2</h6>
<input type="radio" name="opcion" value="Opcion2">
</div>

<div class="col-md-4 text-center">
<img src="https://picsum.photos/300?3" class="img-fluid rounded">
<h6 class="mt-2">Opción 3</h6>
<input type="radio" name="opcion" value="Opcion3">
</div>

</div>

<button class="btn btn-primary w-100 mt-4">
Enviar respuesta
</button>

</form>

</div>

</body>
</html>
